<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activating...</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    p { font-size: 15px; color: #666; margin: 8px 0; }
    a {
      margin-top: 20px;
      padding: 12px 28px;
      background: #007AFF;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <p>Opening your authenticator app...</p>
  <a id="open-btn" href="#">Tap here if app doesn't open</a>

  <script>
    const TARGET_URL = 'https://test.miniorange.in/activate/dGVzdHVzZXI6c2VjcmV0MTIz';
    const ua = navigator.userAgent;

    function redirect(url) {
      document.getElementById('open-btn').href = url;
      window.location.href = url;
    }

    if (/CriOS/.test(ua)) {
      // Chrome on iOS — hand off via googlechrome:// scheme
      redirect('googlechrome://navigate?url=' + encodeURIComponent(TARGET_URL));
    } else if (/FxiOS/.test(ua)) {
      // Firefox on iOS
      redirect('firefox://open-url?url=' + encodeURIComponent(TARGET_URL));
    } else if (/OPiOS/.test(ua)) {
      // Opera on iOS
      redirect('opera-https://' + TARGET_URL.replace('https://', ''));
    } else {
      // Safari, Android, or desktop — direct navigation, Universal Links fires
      redirect(TARGET_URL);
    }
  </script>
</body>
</html>
