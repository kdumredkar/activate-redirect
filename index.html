<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activating...</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    p { font-size: 15px; color: #666; margin: 8px 0; text-align: center; padding: 0 24px; }
    a {
      margin-top: 20px;
      padding: 12px 28px;
      background: #007AFF;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <p id="msg">Opening your authenticator app...</p>
  <a id="open-btn" href="#">Tap here to open app</a>

  <script>
    const TARGET_URL = 'https://test.miniorange.in/activate/dGVzdHVzZXI6c2VjcmV0MTIz';
    const ua = navigator.userAgent;
    const btn = document.getElementById('open-btn');
    const msg = document.getElementById('msg');

    if (/CriOS/.test(ua) || /FxiOS/.test(ua) || /OPiOS/.test(ua)) {
      // Chrome / Firefox / Opera on iOS cannot trigger Universal Links directly.
      // x-safari-https:// forces iOS to open the URL in Safari,
      // which then triggers Universal Links and launches the app.
      const safariURL = 'x-safari-' + TARGET_URL;
      btn.href = safariURL;
      msg.textContent = 'Tap the button below — it will open Safari and launch the app automatically.';
    } else {
      // Safari on iOS, or Android / desktop — direct navigation triggers Universal Links
      btn.href = TARGET_URL;
      window.location.href = TARGET_URL;
    }
  </script>
</body>
</html>
